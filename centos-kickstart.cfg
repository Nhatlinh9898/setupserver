# CentOS/RHEL Automated Installation Configuration (Kickstart)
# File này dùng để cài đặt tự động CentOS/RHEL
# Sử dụng: Thêm "inst.ks=cdrom:/ks.cfg" vào boot parameter khi cài đặt

# Cài đặt cơ bản
install
cdrom
lang en_US.UTF-8
keyboard us
timezone Asia/Ho_Chi_Minh --isUtc

# Cấu hình mạng (DHCP)
network --bootproto=dhcp --device=eth0 --onboot=yes --ipv6=auto --hostname=server-01

# Cấu hình người dùng
rootpw --iscrypted $6$rounds=4096$xyz$your_hashed_password_here  # Thay bằng password hash thực tế
user --name=admin --groups=wheel --password=$6$rounds=4096$xyz$your_hashed_password_here --iscrypted

# Cấu hình disk và partition
autopart --type=lvm --fstype=ext4
clearpart --all --initlabel
bootloader --location=mbr --boot-drive=sda

# Cấu hình firewall và SELinux
firewall --enabled --service=ssh,http,https
selinux --enforcing

# Cấu hình authentication
authconfig --enableshadow --passalgo=sha512

# Cấu hình services
services --enabled=sshd,NetworkManager,chronyd

# Cấu hình repository
repo --name="BaseOS" --baseurl=http://mirror.centos.org/centos/8/BaseOS/x86_64/os/
repo --name="AppStream" --baseurl=http://mirror.centos.org/centos/8/AppStream/x86_64/os/

# Cài đặt packages
%packages
@base
@core
@network-server
@development
vim
curl
wget
git
htop
net-tools
firewalld
fail2ban
unzip
epel-release
%end

# Script chạy sau khi cài đặt (pre-install)
%pre
#!/bin/bash
# Script chạy trước khi cài đặt
echo "Starting CentOS installation..."
%end

# Script chạy sau khi cài đặt (post-install)
%post --log=/root/ks-post.log
#!/bin/bash

# Cập nhật hệ thống
yum update -y

# Cấu hình SSH
sed -i 's/#PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config

# Thêm SSH key cho admin
mkdir -p /home/admin/.ssh
echo "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... your_public_key_here" > /home/admin/.ssh/authorized_keys
chown -R admin:admin /home/admin/.ssh
chmod 700 /home/admin/.ssh
chmod 600 /home/admin/.ssh/authorized_keys

# Cấu hình firewall
firewall-cmd --permanent --add-service=ssh
firewall-cmd --permanent --add-service=http
firewall-cmd --permanent --add-service=https
firewall-cmd --reload

# Cấu hình fail2ban
systemctl enable fail2ban
systemctl start fail2ban

# Cấu hình swap (nếu cần)
dd if=/dev/zero of=/swapfile bs=1M count=4096
chmod 600 /swapfile
mkswap /swapfile
swapon /swapfile
echo '/swapfile none swap sw 0 0' >> /etc/fstab

# Tối ưu hóa sysctl
cat >> /etc/sysctl.conf << EOF
# Network optimization
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_max_tw_buckets = 5000
net.ipv4.ip_local_port_range = 1024 65535
EOF

sysctl -p

# Cấu hình lịch sử command
echo 'export HISTTIMEFORMAT="%d/%m/%y %T "' >> /etc/bashrc

# Hoàn tất
echo "CentOS installation completed successfully!"
%end

# Reboot sau khi cài đặt
reboot
