---
# Main Ansible Playbook cho Monolithic App
# UI + Logic cùng trên một server

- name: Setup App Servers (Monolithic)
  hosts: appservers
  become: yes
  roles:
    - web
    - app

- name: Setup Database Servers
  hosts: dbservers
  become: yes
  roles:
    - database

- name: Setup Data Storage
  hosts: allservers
  become: yes
  roles:
    - data-storage
  when: data_storage_enabled | default(false)

- name: Deploy Application from Git
  hosts: appservers
  become: yes
  roles:
    - deploy
  when: deploy_method | default('git') == 'git'

- name: Prisma Integration
  hosts: appservers
  become: yes
  roles:
    - prisma-integration
  when: prisma_integration_enabled | default(false)

- name: Deploy Application from Local
  hosts: appservers
  become: yes
  roles:
    - deploy-local
  when: deploy_method | default('git') == 'local'

- name: Install Dependencies
  hosts: allservers
  become: yes
  roles:
    - dependencies

- name: Configure and Start Application
  hosts: allservers
  become: yes
  roles:
    - application

- name: Setup Remote Management Tools
  hosts: allservers
  become: yes
  roles:
    - cockpit
    - webmin
    - monitoring
    - portainer

- name: Setup CUDA (GPU Support)
  hosts: allservers
  become: yes
  roles:
    - cuda
  when: install_cuda | default(false)

- name: Setup AI/ML Tools
  hosts: allservers
  become: yes
  roles:
    - ai-ml

- name: Setup AI Security
  hosts: allservers
  become: yes
  roles:
    - ai-security

- name: Setup App Hardening (LỚP 2: Rào chắn bảo vệ code/app)
  hosts: allservers
  become: yes
  roles:
    - app-hardening

- name: Setup Container Isolation (LỚP 2B: Container Sandbox)
  hosts: allservers
  become: yes
  roles:
    - container-isolation

- name: Setup AI Security Response (NHIỆM VỤ CHÍNH: SECURITY)
  hosts: allservers
  become: yes
  roles:
    - ai-security-response

- name: Setup AI Ops
  hosts: allservers
  become: yes
  roles:
    - ai-chatops
    - ai-monitoring
    - ai-healing
    - ai-assistant

- name: Setup Ray Cluster (Distributed Computing)
  hosts: allservers
  become: yes
  roles:
    - ray-cluster
  when: install_ray_cluster | default(false)

- name: Setup GPU API Service
  hosts: gpuservers
  become: yes
  roles:
    - cuda
    - gpu-api-service
  when: install_gpu_api_service | default(false)

- name: Setup Federated Learning (Training phân tán)
  hosts: allservers
  become: yes
  roles:
    - federated-learning
  when: install_federated_learning | default(false)

- name: Setup Mesh Network (P2P VPN)
  hosts: allservers
  become: yes
  roles:
    - mesh-network
  when: install_mesh_network | default(false)

- name: Setup Auto Client Setup API (Tự động cấu hình cho user)
  hosts: allservers
  become: yes
  roles:
    - auto-client-setup
  when: install_auto_client_setup | default(false)
