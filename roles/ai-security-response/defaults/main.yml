---
# Default variables cho AI Security Response

# Cài đặt chính
install_ai_security_response: false
ai_security_response_enabled: false
ai_security_response_model: "llama2"
ai_security_response_interval: 30
ai_security_response_auto_enabled: true
ai_security_response_admin_ip: "0.0.0.0/0"

# Cấu hình detection thresholds
failed_login_threshold: 50
high_connection_threshold: 1000
high_cpu_threshold: 90
high_memory_threshold: 90

# Cấu hình Fail2ban
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 5

# Cấu hình UFW
ufw_allow_ssh: true
ufw_allow_http: true
ufw_allow_https: true
ufw_allow_app_port: true
