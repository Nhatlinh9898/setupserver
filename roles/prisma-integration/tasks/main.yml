---
# Prisma Integration Role - Tích hợp schema có sẵn với data storage

- name: Check if Prisma integration is enabled
  debug:
    msg: "Prisma Integration is enabled: {{ prisma_integration_enabled | default(false) }}"

- name: Find Prisma schema file in project
  find:
    paths: "{{ project_path }}"
    patterns: "schema.prisma"
    recurse: yes
  register: prisma_schema_files
  when: prisma_integration_enabled | default(false)

- name: Display found Prisma schema files
  debug:
    msg: "Found Prisma schema: {{ item.path }}"
  loop: "{{ prisma_schema_files.files }}"
  when: 
    - prisma_integration_enabled | default(false)
    - prisma_schema_files.matched > 0

- name: Check if schema file exists at specified path
  stat:
    path: "{{ project_path }}/{{ prisma_schema_path | default('prisma/schema.prisma') }}"
  register: schema_file
  when: prisma_integration_enabled | default(false)

- name: Display schema file status
  debug:
    msg: "Schema file exists: {{ schema_file.stat.exists | default(false) }}"
  when: prisma_integration_enabled | default(false)

- name: Backup original Prisma schema
  copy:
    src: "{{ project_path }}/{{ prisma_schema_path | default('prisma/schema.prisma') }}"
    dest: "{{ project_path }}/{{ prisma_schema_path | default('prisma/schema.prisma') }}.backup"
    remote_src: yes
  when:
    - prisma_integration_enabled | default(false)
    - schema_file.stat.exists | default(false)
    - prisma_merge_strategy | default('extend') == 'extend'

- name: Add Data Storage models to existing schema (extend strategy)
  blockinfile:
    path: "{{ project_path }}/{{ prisma_schema_path | default('prisma/schema.prisma') }}"
    block: |
      
      // ============================================
      // DATA STORAGE MODELS - Auto-generated by Ansible
      // ============================================
      
      model StorageDisk {
        id              String   @id @default(cuid())
        encryptedId     String   @unique
        name            String   @unique
        mountPoint      String
        devicePath      String
        diskType        String
        totalCapacity   BigInt
        usedCapacity    BigInt   @default(0)
        availableCapacity BigInt
        isPrimary       Boolean  @default(false)
        isActive        Boolean  @default(true)
        createdAt       DateTime @default(now())
        updatedAt       DateTime @updatedAt
      }
      
      model DataItem {
        id              String   @id @default(cuid())
        encryptedId     String   @unique
        title           String
        storagePath     String
        fileSize        BigInt   @default(0)
        compressedSize  BigInt   @default(0)
        categoryId      String?
        createdAt       DateTime @default(now())
        updatedAt       DateTime @updatedAt
      }
      
      model DataCategory {
        id            String   @id @default(cuid())
        encryptedId   String   @unique
        name          String   @unique
        description   String?
        parentId      String?
        level         Int      @default(0)
        isActive      Boolean  @default(true)
        createdAt     DateTime @default(now())
        updatedAt     DateTime @updatedAt
      }
      
      model DataProcessingTask {
        id              String   @id @default(cuid())
        encryptedId     String   @unique
        taskType        String
        inputPath       String
        outputPath      String?
        status          String   @default("PENDING")
        progress        Float    @default(0)
        createdAt       DateTime @default(now())
        updatedAt       DateTime @updatedAt
      }
    marker: "// {mark} ANSIBLE MANAGED BLOCK - DATA STORAGE MODELS"
    insertafter: EOF
  when:
    - prisma_integration_enabled | default(false)
    - schema_file.stat.exists | default(false)
    - prisma_merge_strategy | default('extend') == 'extend'

- name: Generate Prisma Client
  command: npx prisma generate
  args:
    chdir: "{{ project_path }}"
  environment:
    DATABASE_URL: "{{ env_vars.DATABASE_URL | default(lookup('env', 'DATABASE_URL')) }}"
  when:
    - prisma_integration_enabled | default(false)
    - prisma_auto_generate | default(false)
  become: yes
  become_user: "{{ app_user | default('admin') }}"

- name: Run Prisma Migrations
  command: npx prisma migrate deploy
  args:
    chdir: "{{ project_path }}"
  environment:
    DATABASE_URL: "{{ env_vars.DATABASE_URL | default(lookup('env', 'DATABASE_URL')) }}"
  when:
    - prisma_integration_enabled | default(false)
    - prisma_auto_migrate | default(false)
  become: yes
  become_user: "{{ app_user | default('admin') }}"

- name: Display Prisma integration status
  debug:
    msg: |
      Prisma Integration Status:
      - Enabled: {{ prisma_integration_enabled | default(false) }}
      - Schema Path: {{ project_path }}/{{ prisma_schema_path | default('prisma/schema.prisma') }}
      - Merge Strategy: {{ prisma_merge_strategy | default('extend') }}
      - Auto Generate: {{ prisma_auto_generate | default(false) }}
      - Auto Migrate: {{ prisma_auto_migrate | default(false) }}
  when: prisma_integration_enabled | default(false)
