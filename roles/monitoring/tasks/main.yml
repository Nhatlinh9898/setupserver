---
# Monitoring Role - Cài đặt Grafana + Prometheus + Node Exporter

# Cài đặt Prometheus Node Exporter (để collect metrics)
- name: Tạo user cho Prometheus
  user:
    name: prometheus
    system: yes
    shell: /bin/false
    create_home: no

- name: Tạo directory cho Prometheus
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version | default('2.45.0') }}/prometheus-{{ prometheus_version | default('2.45.0') }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy Prometheus binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version | default('2.45.0') }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    remote_src: yes
    mode: '0755'
    owner: prometheus
    group: prometheus
  loop:
    - prometheus
    - promtool

- name: Copy Prometheus console files
  copy:
    src: "/tmp/prometheus-{{ prometheus_version | default('2.45.0') }}.linux-amd64/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    remote_src: yes
    mode: '0644'
    owner: prometheus
    group: prometheus
  loop:
    - consoles
    - console_libraries

- name: Cấu hình Prometheus
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: '0644'
    owner: prometheus
    group: prometheus
  notify: restart prometheus

- name: Tạo Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify:
    - reload systemd
    - restart prometheus

- name: Enable và start Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started
    daemon_reload: yes

# Cài đặt Prometheus Node Exporter
- name: Download Node Exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version | default('1.6.0') }}/node_exporter-{{ node_exporter_version | default('1.6.0') }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: '0644'

- name: Extract Node Exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy Node Exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version | default('1.6.0') }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: yes
    mode: '0755'
    owner: prometheus
    group: prometheus

- name: Tạo Node Exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify:
    - reload systemd
    - restart node_exporter

- name: Enable và start Node Exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

# Cài đặt Grafana
- name: Thêm Grafana repository key (Ubuntu/Debian)
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present
  when: ansible_os_family == "Debian"

- name: Thêm Grafana repository (Ubuntu/Debian)
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
  when: ansible_os_family == "Debian"

- name: Cài đặt Grafana (Ubuntu/Debian)
  apt:
    name: grafana
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  notify: restart grafana

- name: Thêm Grafana repository (CentOS/RHEL)
  yum:
    name: https://dl.grafana.com/oss/release/grafana-{{ grafana_version | default('10.0.0') }}-1.x86_64.rpm
    state: present
    disable_gpg_check: yes
  when: ansible_os_family == "RedHat"
  notify: restart grafana

- name: Cấu hình Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    mode: '0644'
    owner: grafana
    group: grafana
  notify: restart grafana

- name: Enable và start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

- name: Mở port Prometheus trên firewall (Ubuntu)
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "9090"
    - "9100"
  when: ansible_os_family == "Debian"

- name: Mở port Prometheus trên firewall (CentOS)
  firewalld:
    port: "{{ item }}/tcp"
    permanent: yes
    state: enabled
  loop:
    - "9090"
    - "9100"
  when: ansible_os_family == "RedHat"
  notify: reload firewalld

- name: Mở port Grafana trên firewall (Ubuntu)
  ufw:
    rule: allow
    port: "3000"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Mở port Grafana trên firewall (CentOS)
  firewalld:
    port: 3000/tcp
    permanent: yes
    state: enabled
  when: ansible_os_family == "RedHat"
  notify: reload firewalld

- name: Đợi Grafana start
  wait_for:
    port: 3000
    delay: 5
    timeout: 60

- name: Cấu hình Grafana datasource (Prometheus)
  grafana_datasource:
    name: Prometheus
    grafana_url: "http://localhost:3000"
    grafana_user: "{{ grafana_admin_user | default('admin') }}"
    grafana_password: "{{ grafana_admin_password | default('admin') }}"
    org_id: "1"
    ds_type: "prometheus"
    ds_url: "http://localhost:9090"
    state: present
  when: grafana_config_datasource | default(true)
  ignore_errors: yes

handlers:
  - name: restart prometheus
    systemd:
      name: prometheus
      state: restarted

  - name: restart node_exporter
    systemd:
      name: node_exporter
      state: restarted

  - name: restart grafana
    systemd:
      name: grafana-server
      state: restarted

  - name: reload systemd
    systemd:
      daemon_reload: yes

  - name: reload firewalld
    systemd:
      name: firewalld
      state: reloaded
