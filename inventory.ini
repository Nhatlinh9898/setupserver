# App Servers (Monolithic app - UI + Logic cùng một server)
[appservers]
app-01 ansible_host=192.168.1.100 ansible_user=admin
# app-02 ansible_host=192.168.1.101 ansible_user=admin  # Thêm nếu cần scale

# Database Servers (nếu database riêng)
[dbservers]
db-master ansible_host=192.168.1.200 ansible_user=admin
# db-slave ansible_host=192.168.1.201 ansible_user=admin

# Legacy groups for compatibility
[webservers]
app-01

[allservers:children]
appservers
dbservers

[allservers:vars]
ansible_python_interpreter=/usr/bin/python3
