---
# Project Configuration File
# File này dùng để cấu hình dự án của bạn cho việc deploy tự động
# Copy file này và chỉnh sửa theo nhu cầu của bạn

# Phương pháp deploy: git hoặc local
deploy_method: "git"  # "git" để clone từ Git, "local" để copy từ local directory

# Thông tin Git Repository (chỉ dùng khi deploy_method = "git")
git_repository: "https://github.com/Nhatlinh9898/AmazeBid-Hybrid-E-commerce-Auction-Platform-v10.git"  # URL repository của bạn
git_branch: "main"  # Branch để deploy
# git_ssh_private_key: "-----BEGIN OPENSSH PRIVATE KEY-----..."  # Private key cho repo private (nếu cần)
# git_password: "your_password"  # Password cho repo private (không khuyến khích)

# Thông tin Local Code (chỉ dùng khi deploy_method = "local")
# local_code_path: "./app-code"  # Đường dẫn đến code trên máy local (tương đối với thư mục playbook)

# Thông tin Project (Monolithic App - UI + Logic cùng một server)
app_name: "amazebid"  # Tên ứng dụng
app_user: "admin"  # User chạy ứng dụng
project_path: "/opt/apps/amazebid"  # Đường dẫn đến project trên server
app_port: 3000  # Port ứng dụng

# Cấu hình cho Monolithic App (UI + Logic cùng một place)
# Loại bỏ cấu hình frontend/backend riêng biệt
app_type: "nodejs"  # nodejs, python, php, go, java, rails, django
app_framework: "express"  # express, flask, django, rails, laravel, v.v.

# Cấu hình cho TypeScript + Vite + React + Node.js
use_typescript: true  # App sử dụng TypeScript
use_vite: true  # Frontend dùng Vite build tool
use_prisma: true  # Sử dụng Prisma ORM
use_firebase: true  # Sử dụng Firebase

# Environment Variables (cho Monolithic App)
env_vars:
  NODE_ENV: "production"
  PORT: "3000"
  # Database connection (Prisma - PostgreSQL)
  DATABASE_URL: "postgresql://amazebid_user:change_this_password@localhost:5432/amazebid?schema=public"
  # Firebase Configuration
  FIREBASE_API_KEY: "your-firebase-api-key"
  FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  FIREBASE_PROJECT_ID: "your-project-id"
  FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  FIREBASE_MESSAGING_SENDER_ID: "your-sender-id"
  FIREBASE_APP_ID: "your-app-id"
  # Firebase Admin (Server-side)
  FIREBASE_SERVICE_ACCOUNT_JSON: "your-firebase-service-account-json"
  # Redis Configuration
  REDIS_URL: "redis://localhost:6379"
  # Stripe Configuration
  STRIPE_SECRET_KEY: "your-stripe-secret-key"
  STRIPE_PUBLISHABLE_KEY: "your-stripe-publishable-key"
  # JWT Secret
  JWT_SECRET: "change-this-jwt-secret-in-production"
  # Gemini AI Configuration
  GEMINI_API_KEY: "your-gemini-api-key"
  # AI Model Configuration
  VITE_AI_MODEL_FLASH: "gemini-3-flash-preview"
  VITE_AI_MODEL_PRO: "gemini-3.1-pro-preview"
  VITE_AI_MODEL_LITE: "gemini-3.1-flash-lite-preview"
  VITE_AI_MODEL_IMAGE: "gemini-2.5-flash-image"
  VITE_AI_MODEL_VIDEO: "veo-3.1-fast-generate-preview"
  VITE_AI_MODEL_TTS: "gemini-2.5-flash-preview-tts"
  # Hosting & Domain Configuration
  VITE_APP_URL: "http://localhost:3000"
  VITE_ADMIN_EMAIL: "Nhatlinhckm2016@gmail.com"
  ADMIN_PASSWORD: "admin123"
  MASTER_RECOVERY_KEY: "your-super-secret-recovery-key-2026"
  # Email Configuration (Resend)
  RESEND_API_KEY: "your-resend-api-key"
  EMAIL_FROM: "onboarding@resend.dev"
  # ONNX Runtime Configuration
  ORT_LOGGING_LEVEL: "4"
  # Thêm các biến môi trường khác ở đây

# Hoặc sử dụng env_content để paste trực tiếp
# env_content: |
#   NODE_ENV=production
#   PORT=3000
#   DATABASE_URL=postgresql://user:password@localhost:5432/mydb

# Cấu hình Node.js
node_env: "production"
node_script: "server.ts"  # File chính để chạy (server.ts cho TypeScript)
node_instances: 1  # Số instances (cluster mode)
node_exec_mode: "fork"  # fork hoặc cluster
node_max_memory: "1G"  # Memory limit cho mỗi instance
npm_build: true  # Chạy npm run build sau khi cài dependencies (cho Vite)
npm_build_command: "npm run build"  # Command build (Vite: npm run build)
use_pm2: true  # Sử dụng PM2 để quản lý Node.js app
use_ts_node: false  # Sử dụng tsx thay vì ts-node

# Cấu hình Python
python_command: "gunicorn"  # Command để chạy Python app
python_app_module: "app:app"  # Module:variable (cho Flask/Django)

# Cấu hình Django
django_settings_module: "myproject.settings"  # Django settings module
django_wsgi_module: "myproject.wsgi:application"  # WSGI module

# Cấu hình Flask
flask_app_module: "app:app"  # Flask app module

# Cấu hình PHP
php_version: "8.1"  # Phiên bản PHP
domain_name: "example.com"  # Domain name cho Nginx config

# Cấu hình Rails
rails_env: "production"
puma_workers: 2
puma_threads_min: 0
puma_threads_max: 16

# Cấu hình Go
# Không cần cấu hình thêm, sẽ tự động detect main.go

# Cấu hình Docker
docker_image_name: "my-app"
docker_image_tag: "latest"
# docker_compose: true  # Sử dụng docker-compose nếu có docker-compose.yml

# Cấu hình Database
install_mysql: false
install_postgresql: true
postgresql_database: "amazebid"
postgresql_user: "amazebid_user"
postgresql_password: "change_this_password"  # ĐỔI PASSWORD NÀY!

# Cấu hình Redis (cho BullMQ queue và caching)
install_redis: true
redis_port: 6379
redis_bind: "127.0.0.1"
redis_password: ""  # Đặt password nếu cần

# Cấu hình Prisma ORM
prisma_generate: true  # Chạy prisma generate sau khi cài dependencies
prisma_migrate: true  # Chạy prisma migrate deploy
prisma_seed: false  # Chạy prisma db seed (nếu có seed file)
prisma_schema_path: "./prisma/schema.prisma"  # Đường dẫn đến schema file

# Cấu hình Prisma Integration - Tích hợp schema có sẵn với data storage
prisma_integration_enabled: true  # Bật tích hợp Prisma schema
prisma_merge_strategy: "extend"  # extend (thêm vào) hoặc replace (thay thế)
prisma_auto_generate: true  # Tự động generate Prisma client sau khi merge
prisma_auto_migrate: true  # Tự động chạy migrations sau khi merge

# Cấu hình Web Server
install_apache: false  # Set true nếu muốn dùng Apache thay vì Nginx

# Cấu hình Application
create_systemd_service: false  # Tạo systemd service cho generic app
systemd_command: "./start.sh"  # Command để start app
systemd_env_vars: "NODE_ENV=production"  # Environment variables cho systemd

# Health Check
health_check_enabled: true
health_check_path: "/health"
health_check_status: 200

# Backup Configuration
backup_enabled: true
backup_before_deploy: true  # Tự động backup trước khi deploy
backup_retention_days: 30  # Giữ backup trong 30 ngày
backup_database: true  # Backup database
backup_code: true  # Backup code
backup_path: "/opt/backups/amazebid"

# Rollback Configuration
rollback_enabled: true
rollback_auto_on_failure: false  # Tự động rollback khi deploy thất bại (khuyến nghị: false)
rollback_keep_versions: 5  # Giữ 5 phiên bản để rollback

# Tùy chọn khác
create_upload_dir: false  # Tạo directory uploads
composer_no_dev: true  # Không cài dev dependencies cho Composer
bundler_deployment: true  # Deployment mode cho Bundler

# Cấu hình Firewall
allow_ssh_ip: "0.0.0.0/0"  # Giới hạn IP cho SSH nếu cần

# Cấu hình Cockpit (Web Interface quản lý server)
cockpit_allow_remote: false  # Cho phép remote connections
cockpit_ssl_enabled: true  # Bật SSL/TLS
cockpit_create_user: false  # Tạo user riêng cho Cockpit
cockpit_user: "cockpitadmin"  # Username cho Cockpit
cockpit_password: "$6$rounds=4096$xyz$change_this_password"  # Password hash cho Cockpit

# Cấu hình Webmin (Web Interface quản lý hệ thống)
webmin_install_modules: false  # Cài đặt thêm các Webmin modules

# Cấu hình Monitoring (Grafana + Prometheus)
prometheus_version: "2.45.0"  # Phiên bản Prometheus
node_exporter_version: "1.6.0"  # Phiên bản Node Exporter
grafana_version: "10.0.0"  # Phiên bản Grafana
grafana_admin_user: "admin"  # Admin user cho Grafana
grafana_admin_password: "admin"  # ĐỔI PASSWORD NÀY!
grafana_domain: "localhost"  # Domain cho Grafana
grafana_anonymous_enabled: false  # Cho phép anonymous access
grafana_org_name: "Main Org."  # Tên organization
grafana_anonymous_role: "Viewer"  # Role cho anonymous user
grafana_log_level: "info"  # Log level
grafana_config_datasource: true  # Tự động cấu hình Prometheus datasource

# Cấu hình Portainer (Docker Management Web Interface)
portainer_version: "latest"  # Phiên bản Portainer
portainer_http_enabled: false  # Bật HTTP port 9000 (không khuyến khích)

# Cấu hình AI/ML Tools
install_ollama: true  # Cài đặt Ollama
ollama_models:  # Models để pull với Ollama
  - "llama2"
  - "mistral"
  - "codellama"
ollama_api_enabled: true  # Bật Ollama API server
ollama_api_port: 11434  # Port cho Ollama API

install_python_ml: false  # Cài đặt Python ML libraries (PyTorch, TensorFlow, v.v.)
install_python_llm: false  # Cài đặt Python LLM libraries (LangChain, Transformers, v.v.)
install_nodejs_ml: false  # Cài đặt Node.js ML libraries
install_stable_diffusion: false  # Cài đặt Stable Diffusion WebUI
install_text_generation_webui: false  # Cài đặt Text Generation WebUI
install_whisper: false  # Cài đặt Whisper (Speech-to-Text)
install_tts: false  # Cài đặt TTS (Text-to-Speech)
install_rag_tools: false  # Cài đặt RAG tools (LlamaIndex, ChromaDB, v.v.)

# Cấu hình CUDA (GPU support)
install_cuda: false  # Cài đặt NVIDIA CUDA toolkit (cần GPU NVIDIA)
cuda_version: "12-1"  # Phiên bản CUDA
nvidia_driver_version: "535"  # Phiên bản NVIDIA driver
install_cudnn: false  # Cài đặt cuDNN (cần URL download)
cudnn_url: ""  # URL để download cuDNN (từ NVIDIA developer)
install_pytorch_cuda: false  # Cài đặt PyTorch với CUDA support
cuda_version_short: "121"  # Phiên bản CUDA short (cho PyTorch)

# Cấu hình Ray Cluster (Distributed Computing)
install_ray_cluster: false  # Cài đặt Ray Cluster cho distributed computing
ray_cluster_name: "default-cluster"  # Tên cluster
ray_node_type: "head"  # head hoặc worker
ray_head_address: "192.168.1.100"  # Địa chỉ IP của head node (chỉ worker)
ray_head_port: 6379  # Port của Ray head
ray_dashboard_port: 8265  # Port của Ray dashboard
ray_cpu_resources: 2  # Số CPU cho Ray (default: ansible_processor_vcpus)
ray_memory_resources: 4  # Memory GB cho Ray (default: ansible_memtotal_mb // 1024)
ray_worker_cpus: 2  # Số CPU cho worker
ray_worker_gpus: 1  # Số GPU cho worker (nếu có GPU)
ray_worker_memory: 4  # Memory GB cho worker

# Cấu hình GPU API Service (REST API cho GPU)
install_gpu_api_service: false  # Cài đặt GPU API Service trên máy GPU
gpu_api_port: 8000  # Port cho GPU API
gpu_api_memory_limit: "8G"  # Memory limit cho GPU API service
gpu_monitor_interval: 60  # Giây giữa các lần monitor GPU
gpu_memory_alert_threshold: 90  # Cảnh báo khi GPU memory > 90%

# Cấu hình Federated Learning (Training phân tán)
install_federated_learning: false  # Cài đặt Federated Learning
federated_node_type: "server"  # server hoặc client
federated_server_address: "192.168.1.100:8080"  # Địa chỉ server (cho client)
federated_server_port: 8080  # Port của Federated Learning server
federated_client_id: 1  # ID của client
federated_num_rounds: 10  # Số rounds training
federated_min_clients: 2  # Số clients tối thiểu để bắt đầu round
federated_min_available_clients: 2  # Số clients tối thiểu available
federated_fraction_fit: 1.0  # Tỷ lệ clients tham gia mỗi round
federated_local_epochs: 5  # Số epochs local training
federated_batch_size: 32  # Batch size cho local training
federated_learning_install_deps: true  # Cài đặt dependencies

# Cấu hình Mesh Network (P2P VPN)
install_mesh_network: false  # Cài đặt Mesh Network
mesh_network_type: "wireguard"  # wireguard hoặc tailscale
mesh_node_name: "node-1"  # Tên node trong mesh network
mesh_wireguard_address: "10.0.0.1/24"  # Địa chỉ IP trong mesh network
mesh_wireguard_port: 51820  # Port WireGuard
mesh_peers: []  # List peers (điền sau khi có public keys)
mesh_test_peer: "10.0.0.1"  # Peer để test connectivity
tailscale_auth_key: ""  # Auth key cho Tailscale (nếu dùng Tailscale)

# Cấu hình Auto Client Setup (Zero-setup cho user - chỉ cần truy cập web)
install_auto_client_setup: false  # Cài đặt Auto Client Setup API
auto_setup_api_port: 9000  # Port cho Auto Setup API
vite_app_url: "http://localhost:3000"  # URL của commercial app (user sẽ được redirect đến đây)

# Cấu hình Commercial App Deployment (App thương mại của bạn)
install_commercial_app: false  # Cài đặt và deploy commercial app
commercial_app_name: "my-commercial-app"  # Tên commercial app
commercial_app_path: "/opt/commercial-app"  # Đường dẫn cài đặt commercial app
commercial_app_port: 3000  # Port cho commercial app
deploy_method: "git"  # git hoặc local

# Git Repository cho commercial app (nếu deploy_method = git)
git_repository: "https://github.com/yourusername/your-commercial-app.git"
git_branch: "main"

# Local code path cho commercial app (nếu deploy_method = local)
local_app_code_path: "./commercial-app-code"

# Cấu hình Node.js cho commercial app
node_env: "production"
node_script: "server.ts"  # File chính (TypeScript)
node_instances: 1  # Số instances PM2
node_exec_mode: "fork"  # fork hoặc cluster
node_max_memory: "1G"  # Memory limit cho mỗi instance
npm_build: true  # Chạy npm run build (Vite)
npm_build_command: "npm run build"
use_pm2: true  # Sử dụng PM2 để quản lý
use_ts_node: true  # Sử dụng ts-node

# Cấu hình P2P Relay (GunDB) cho commercial app
p2p_relay_enabled: true  # Bật P2P Relay
p2p_relay_port: 8765  # Port cho P2P Relay

# Cấu hình Socket.io cho commercial app
socket_io_enabled: true  # Bật Socket.io
socket_io_port: 3001  # Port cho Socket.io

# Cấu hình Mesh Network cho commercial app
mesh_network_enabled: true  # Kết nối với mesh network
mesh_network_ip: "10.0.0.1"  # IP trong mesh network

# Cấu hình Database cho commercial app
database_url: "postgresql://user:password@localhost:5432/commercialapp"

# Cấu hình Firebase cho commercial app (nếu dùng)
firebase_api_key: "your-firebase-api-key"
firebase_auth_domain: "your-project.firebaseapp.com"
firebase_project_id: "your-project-id"
firebase_storage_bucket: "your-project.appspot.com"
firebase_messaging_sender_id: "your-sender-id"
firebase_app_id: "your-app-id"

# Cấu hình Vite cho commercial app
vite_app_url: "https://your-app.com"  # URL của app (không có dấu / ở cuối)

# Cấu hình Nginx cho commercial app
install_nginx: true  # Cài đặt và cấu hình Nginx
domain_name: "your-app.com"  # Domain name cho Nginx config

# Cấu hình Security cho commercial app
jwt_secret: "change-this-secret-in-production"
encryption_key: "change-this-encryption-key"

# Cấu hình Logging cho commercial app
log_level: "info"
log_file: "/var/log/commercial-app/app.log"

# Cấu hình AI Ops (AI tự vận hành server)
install_ai_chatops: false  # Chat với AI để quản lý server
chatops_service_enabled: false  # Bật ChatOps service
chatops_model: "llama2"  # Model cho ChatOps

install_ai_monitoring: false  # AI phân tích logs và metrics tự động
ai_monitoring_enabled: false  # Bật AI Monitoring service
ai_monitoring_model: "llama2"  # Model cho AI Monitoring
ai_monitoring_interval: 300  # Kiểm tra mỗi 300 giây (5 phút)

install_ai_healing: false  # Auto-healing với AI
ai_healing_enabled: false  # Bật AI Healing service
ai_healing_model: "llama2"  # Model cho AI Healing
ai_healing_interval: 60  # Kiểm tra mỗi 60 giây (1 phút)
ai_healing_auto_enabled: false  # Bật auto-healing tự động (CẢNH BÁO: AI sẽ tự động restart services) - LUÔN ĐỂ FALSE

install_ai_assistant: false  # AI assistant với RAG
ai_assistant_model: "llama2"  # Model cho AI Assistant

# Cấu hình AI Security Response - AI tự động phát hiện và phản hồi tấn công mạng
install_ai_security_response: true  # Cài đặt AI Security Response (NHIỆM VỤ CHÍNH: SECURITY)
ai_security_response_enabled: true  # Bật AI Security Response service
ai_security_response_model: "llama2"  # Model cho AI Security Response
ai_security_response_interval: 30  # Kiểm tra mỗi 30 giây
ai_security_response_auto_enabled: true  # Bật auto-response tự động (AI sẽ tự động phản hồi tấn công)
ai_security_response_admin_ip: "0.0.0.0/0"  # IP của admin để cho phép SSH khi isolate server

# Cấu hình App Hardening - Bảo vệ code và app (LỚP 2: Rào chắn bảo vệ)
install_app_hardening: true  # Cài đặt App Hardening
app_hardening_enabled: true  # Bật App Hardening service
app_hardening_immutable: true  # Làm code read-only (immutable)
app_hardening_integrity_check: true  # Kiểm tra integrity thường xuyên
app_hardening_snapshots: true  # Tạo snapshots tự động
app_hardening_max_snapshots: 10  # Số snapshots tối đa

# Cấu hình Container Isolation - Chạy app trong container (LỚP 2B: Container Sandbox)
install_container_isolation: true  # Cài đặt Container Isolation
container_monitor_enabled: true  # Bật Container Monitor service
docker_base_image: "python:3.9-slim"  # Base image cho container
container_cpu_limit: "1.0"  # CPU limit cho container
container_memory_limit: "512M"  # Memory limit cho container
container_cpu_reservation: "0.5"  # CPU reservation
container_memory_reservation: "256M"  # Memory reservation
container_subnet: "172.20.0.0/16"  # Subnet cho container network
container_uid: "1000"  # User ID trong container
container_gid: "1000"  # Group ID trong container

# Load Balancer (chỉ dùng khi có nhiều app servers)
# install_loadbalancer: false  # Bật nếu cần load balancing cho nhiều app servers

# ============================================
# DATA STORAGE CONFIGURATION - Xử lý và lưu trữ data
# ============================================

# Bật Data Storage
data_storage_enabled: true
storage_subdir: "data"

# Cấu hình các ổ cứng server
storage_disks:
  - name: "primary"
    device: "/dev/sdb1"
    mount_point: "/mnt/data-primary"
    fstype: "xfs"
    format: false
    mount_options: "defaults,noatime"
    disk_type: "SSD"
    is_primary: true
    is_hot_swap: false
    
  - name: "hot"
    device: "/dev/sdc1"
    mount_point: "/mnt/data-hot"
    fstype: "xfs"
    format: false
    mount_options: "defaults,noatime"
    disk_type: "NVME"
    is_primary: false
    is_hot_swap: true
    
  - name: "archive"
    device: "/dev/sdd1"
    mount_point: "/mnt/data-archive"
    fstype: "ext4"
    format: false
    mount_options: "defaults,noatime"
    disk_type: "HDD"
    is_primary: false
    is_hot_swap: false
    
  - name: "backup"
    device: "/dev/sde1"
    mount_point: "/mnt/data-backup"
    fstype: "ext4"
    format: false
    mount_options: "defaults,noatime"
    disk_type: "HDD"
    is_primary: false
    is_hot_swap: false

# Chiến lược phân bổ storage
storage_allocation_strategy: "round_robin"  # round_robin, least_used, priority
default_disk_for_upload: "primary"
archive_after_days: 90
backup_retention_days: 365

# Storage Monitoring & Alerts
storage_monitoring_enabled: true
storage_warning_threshold: 80  # Cảnh báo khi > 80%
storage_critical_threshold: 90  # Cảnh báo nghiêm trọng khi > 90%
storage_alert_email: "admin@example.com"  # Email để nhận cảnh báo
# storage_alert_webhook: "https://hooks.slack.com/..."  # Optional Slack webhook

# Auto-archive khi ổ cứng đầy
auto_archive_enabled: true
auto_archive_threshold: 85  # Archive khi > 85%
archive_target_disk: "archive"  # Archive sang ổ cứng nào

# Cấu hình nén dữ liệu
compression_enabled: true
compression_algorithm: "zstd"  # gzip, lz4, zstd, brotli
compression_level: 6
compress_files_larger_than: "10MB"
compress_content_types:
  - "text/*"
  - "application/json"
  - "application/xml"
  - "application/javascript"

# Cấu hình mã hóa dữ liệu
encryption_enabled: true
encryption_algorithm: "AES-256-GCM"
encryption_key_rotation_days: 90
encrypt_at_rest: true
encrypt_in_transit: true

# Cấu hình phân loại dữ liệu
auto_classify_enabled: true
classification_model: "local"  # local, ai
default_access_level: "INTERNAL"
max_tags_per_item: 10

# Cấu hình version control
version_control_enabled: true
max_versions_per_item: 10
keep_versions_for_days: 365

# Cấu hình audit logging
audit_log_enabled: true
audit_log_retention_days: 365
log_access_attempts: true
log_data_changes: true

# Environment Variables cho Data Storage
data_storage_env_vars:
  # Database
  DATA_STORAGE_DATABASE_URL: "postgresql://amazebid_user:change_this_password@localhost:5432/amazebid"
  
  # Encryption Keys (PHẢI ĐỔI TRONG PRODUCTION!)
  DATA_STORAGE_ENCRYPTION_KEY: "your-256-bit-encryption-key-here-change-this"
  DATA_STORAGE_ID_ENCRYPTION_KEY: "your-id-encryption-key-here-change-this"
  
  # Storage Paths
  DATA_STORAGE_PRIMARY_PATH: "/mnt/data-primary/data"
  DATA_STORAGE_HOT_PATH: "/mnt/data-hot/data"
  DATA_STORAGE_ARCHIVE_PATH: "/mnt/data-archive/data"
  DATA_STORAGE_BACKUP_PATH: "/mnt/data-backup/data"
  
  # Compression
  DATA_STORAGE_COMPRESSION_ENABLED: "true"
  DATA_STORAGE_COMPRESSION_ALGORITHM: "zstd"
  DATA_STORAGE_COMPRESSION_LEVEL: "6"
  
  # Classification
  DATA_STORAGE_AUTO_CLASSIFY_ENABLED: "true"
  DATA_STORAGE_CLASSIFICATION_MODEL: "local"
  
  # Version Control
  DATA_STORAGE_VERSION_CONTROL_ENABLED: "true"
  DATA_STORAGE_MAX_VERSIONS: "10"
  
  # Audit
  DATA_STORAGE_AUDIT_LOG_ENABLED: "true"
  DATA_STORAGE_AUDIT_LOG_RETENTION_DAYS: "365"
